<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PawGuardian — India's First At-Home Preventive Pet Care</title>
  <meta name="description"
    content="PawGuardian is India's first subscription-based, at-home preventive pet care ecosystem. Managed healthcare for your pet at every stage of their life." />
  <meta property="og:title" content="PawGuardian — Preventive Pet Care, Delivered Home" />
  <meta property="og:description"
    content="Stop waiting for symptoms. PawGuardian brings vet-grade diagnostics, vaccinations, and expert guidance to your door." />
  <meta property="og:type" content="website" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            background: 'var(--color-background)',
            surface: 'var(--color-surface)',
            primary: 'var(--color-primary)',
            'primary-hover': 'var(--color-primary-hover)',
            text: {
              primary: 'var(--color-text-primary)',
              secondary: 'var(--color-text-secondary)',
            },
            border: 'var(--color-border)',
            accent: {
              orange: 'var(--color-accent-orange)',
              teal: 'var(--color-accent-teal)',
            }
          },
          animation: {
            'blob': 'blob 7s infinite',
            'shimmer': 'shimmer 2s linear infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '0 0' },
              '100%': { backgroundPosition: '-200% 0' },
            }
          }
        },
      },
    }
  </script>
  <style>
    /* ── SaaS Design Tokens ───────────────────────────── */
    :root {
      /* Colors */
      --color-primary: #111827;
      /* Charcoal */
      --color-primary-hover: #1f2937;
      /* Slightly lighter charcoal */

      --color-background: #f8f4e8;
      /* Brand Cream */
      --color-surface: #ffffff;
      /* Pure White for cards/containers */

      --color-text-primary: #111827;
      /* High contrast text */
      --color-text-secondary: #4b5563;
      /* Muted body text */

      --color-border: #e5e7eb;
      /* Light gray for subtle structure */

      --color-accent-orange: #FF8E00;
      /* Primary brand highlight */
      --color-accent-teal: #0d9488;
      /* Secondary accent */

      /* Typography */
      --font-display: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    /* ── Typography Scale & Roots ─────────────────────────────── */
    body {
      font-family: var(--font-body);
      color: var(--color-text-primary);
      background-color: var(--color-background);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Plus Jakarta Sans on all headings */
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* ── Scrollbar ──────────────────────────────── */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--color-background);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-primary);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-primary-hover);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "framer-motion": "https://esm.sh/framer-motion@^12.34.0"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
